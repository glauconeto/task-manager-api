version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: api_spring_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: api_spring
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: api_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: