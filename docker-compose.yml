version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-manager-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/api_spring
      SPRING_DATASOURCE_USERNAME: api_user
      SPRING_DATASOURCE_PASSWORD: api_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - task-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/users"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
  postgres:
    image: postgres:17-alpine
    container_name: task-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_spring
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: api_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_user -d api_spring"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task-network


volumes:
  postgres_data:

networks:
  task-network:
    driver: bridge