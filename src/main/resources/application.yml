server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: task-manager-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/api_spring}
    username: ${SPRING_DATASOURCE_USERNAME:api_user}
    password: ${SPRING_DATASOURCE_PASSWORD:api_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:change-me-in-prod-please-use-a-long-random-secret}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}