spring:
  application:
    name: task-manager-api

  datasource:
    url: jdbc:postgresql://localhost:5432/api_spring
    username: api_user
    password: api_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
